# ─────────────────────────────────────────────────────────────────
# WORKFLOW 3 : Pipeline complet (linting + tests + couverture)
# Objectif : enchaîner plusieurs jobs et générer un rapport téléchargeable.
# ─────────────────────────────────────────────────────────────────

name: 03 - Pipeline complet

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ─── JOB 1 : Vérification du style de code ───────────────────
  linter:
    name: Linter (style et formatage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les outils de linting
        run: pip install flake8 black

      - name: Vérifier le formatage avec Black
        run: black --check src/ tests/

      - name: Vérifier le style avec Flake8
        run: flake8 src/ tests/ --max-line-length=100

  # ─── JOB 2 : Tests + couverture ──────────────────────────────
  tests:
    name: Tests et couverture
    runs-on: ubuntu-latest
    needs: linter             # ← ne s'exécute que si le linter a réussi

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lancer les tests avec mesure de couverture
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=term \
            --cov-report=html \
            --cov-fail-under=80

      # Sauvegarde du rapport HTML comme artifact téléchargeable
      - name: Sauvegarder le rapport de couverture
        if: always()           # exécuté même si les tests échouent
        uses: actions/upload-artifact@v4
        with:
          name: rapport-couverture
          path: htmlcov/
          retention-days: 7
